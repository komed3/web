name: Deploy & Deploy

on:
  push:
    branches: [ master ]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Fetch GitHub Data
        run: npm run fetch
        env:
          TOKEN: ${{ secrets.TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Build App
        run: npm run build
